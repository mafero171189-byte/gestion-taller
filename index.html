<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. MATIAS - Gestión Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #1a2a3a; --secondary: #3498db; --success: #27ae60; --danger: #e53e3e; --wapp: #25d366; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        #status { font-size: 11px; font-weight: bold; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; }
        .online { background: #dcfce7; color: #166534; }
        .offline { background: #fee2e2; color: #991b1b; }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; background: #fdfdfd; padding: 20px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 25px; }
        .full { grid-column: 1 / -1; }
        label { display: block; font-size: 11px; font-weight: bold; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        input:focus { outline: 2px solid var(--secondary); border-color: transparent; }
        
        .flex-align-bottom { display: flex; align-items: flex-end; gap: 8px; }
        .check-container { display: flex; align-items: center; gap: 8px; height: 41px; cursor: pointer; font-size: 12px; font-weight: bold; color: #1a2a3a; }
        .check-container input { width: 18px; height: 18px; cursor: pointer; margin: 0; }

        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-main { background: var(--primary); color: white; width: 100%; }
        .btn-wapp { background: var(--wapp); color: white; font-size: 11px; padding: 6px 10px; margin-top: 5px; border-radius: 6px; border:none; cursor:pointer;}
        .btn-lock { background: #f1f5f9; border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 16px; height: 41px; display: flex; align-items: center; justify-content: center; width: 45px; box-sizing: border-box;}
        
        .btn-excel-discreto { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; float: right; margin-top: 20px; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 850px; }
        th { background: #f1f5f9; text-align: left; padding: 12px; font-size: 11px; color: #475569; border-bottom: 2px solid #e2e8f0; text-transform: uppercase;}
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle;}
        .order-tag { background: #ebf8ff; color: #2b6cb0; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-family: monospace; border: 1px solid #bee3f8;}
        
        .badge-pagado { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .badge-debe { background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; backdrop-filter: blur(3px); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 10% auto; padding: 25px; border-radius: 15px; position: relative;}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">📱 S.T. MATIAS</h2>
        <div id="status" class="offline">CONECTANDO...</div>
    </div>

    <form id="repairForm">
        <div class="form-grid">
            <div><label>N° Orden</label><input type="text" id="nroOrden" readonly placeholder="AUTO"></div>
            <div><label>Cliente</label><input type="text" id="cliente" required oninput="autoOrden()" autofocus></div>
            <div><label>WhatsApp Cliente</label><input type="text" id="tel" required placeholder="549..."></div>
            <div><label>Modelo</label><input type="text" id="modelo" required></div>
            <div><label>Color</label><input type="text" id="color"></div>
            <div><label>IMEI / Serie</label><input type="text" id="imei"></div>
            <div><label>Precio Final $</label><input type="number" id="precio" value="0"></div>
            
            <div class="flex-align-bottom">
                <div style="flex-grow: 1;">
                    <label>Seña $</label>
                    <input type="number" id="sena" value="0">
                </div>
                <label class="check-container">
                    <input type="checkbox" id="esPagado"> PAGO TOTAL
                </label>
            </div>
            
            <div class="flex-align-bottom">
                <div id="costoWrapper" style="display: none; flex-grow: 1;">
                    <label>Costo Repuesto $</label>
                    <input type="number" id="costoRepuesto" value="0">
                </div>
                <div>
                    <button type="button" class="btn-lock" onclick="toggleCosto()" id="lockBtn">🔓</button>
                </div>
            </div>

            <div class="full"><label>Falla Reportada</label><input type="text" id="falla" required></div>
            <div class="full"><label>Observaciones</label><input type="text" id="observaciones"></div>
            
            <div class="full">
                <button type="submit" id="btnSubmit" class="btn btn-main">REGISTRAR EQUIPO</button>
                <button type="button" id="btnCancel" class="btn" style="display:none; width:100%; margin-top:10px; background:#94a3b8; color:white;" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
            </div>
        </div>
    </form>

    <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input type="text" id="search" placeholder="🔎 Buscar (incluye archivados)..." onkeyup="renderTable()" style="flex-grow:1; padding:10px; border-radius:8px; border:1px solid #cbd5e0;">
        <button class="btn" style="background:#64748b; color:white; font-size:12px;" onclick="toggleArchivo()" id="btnArchivo">📁 VER ARCHIVADOS</button>
    </div>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Orden</th>
                    <th>Cliente</th>
                    <th>Equipo / Falla</th>
                    <th>Estado</th>
                    <th>Monto / Saldo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button class="btn-excel-discreto" onclick="exportarExcel()">📥 EXCEL</button>
</div>

<div id="historialModal" class="modal">
    <div class="modal-content">
        <span style="position:absolute; right:20px; top:15px; cursor:pointer; font-size: 20px;" onclick="cerrarModal()">&times;</span>
        <h3>🕒 Historial de Estados</h3>
        <ul id="listaHistorial" style="font-size:14px; padding-left:20px; line-height: 2;"></ul>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDI02DP9KrCRpAdSF6SmPr91TssLEf8290",
        authDomain: "github-c3e96.firebaseapp.com",
        databaseURL: "https://github-c3e96-default-rtdb.firebaseio.com",
        projectId: "github-c3e96",
        storageBucket: "github-c3e96.firebasestorage.app",
        messagingSenderId: "403618822429",
        appId: "1:403618822429:web:ace2540068e2edba9809f4"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dbRef = db.ref('reparaciones');

    let registros = [];
    let idEditando = null;
    let modoArchivo = false;

    // Formateador de moneda
    const fmt = new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', minimumFractionDigits: 0 });

    db.ref(".info/connected").on("value", s => {
        const div = document.getElementById('status');
        div.innerText = s.val() ? "ONLINE" : "CONECTANDO...";
        div.className = s.val() ? "online" : "offline";
    });

    function toggleCosto() {
        const wrap = document.getElementById('costoWrapper');
        const btn = document.getElementById('lockBtn');
        wrap.style.display = (wrap.style.display === "none") ? "block" : "none";
        btn.innerText = (wrap.style.display === "none") ? "🔓" : "🔒";
    }

    function autoOrden() {
        if (!idEditando && document.getElementById('cliente').value.length > 2 && !document.getElementById('nroOrden').value) {
            document.getElementById('nroOrden').value = "MAT-" + Math.floor(Math.random() * 90000 + 10000);
        }
    }

    document.getElementById('repairForm').addEventListener('submit', e => {
        e.preventDefault();
        const esPagado = document.getElementById('esPagado').checked;
        const precio = parseFloat(document.getElementById('precio').value) || 0;
        
        const data = {
            orden: document.getElementById('nroOrden').value,
            cliente: document.getElementById('cliente').value,
            tel: document.getElementById('tel').value,
            modelo: document.getElementById('modelo').value,
            color: document.getElementById('color').value || 'S/C',
            imei: document.getElementById('imei').value || 'N/A',
            precio: precio,
            sena: esPagado ? precio : (parseFloat(document.getElementById('sena').value) || 0),
            costoRepuesto: parseFloat(document.getElementById('costoRepuesto').value) || 0,
            falla: document.getElementById('falla').value,
            observaciones: document.getElementById('observaciones').value || '',
            archivado: false,
            estado: idEditando ? registros.find(x => x.id === idEditando).estado : "Pendiente"
        };

        if (idEditando) {
            db.ref('reparaciones/' + idEditando).update(data).then(() => { cancelarEdicion(); });
        } else {
            data.fecha = new Date().toLocaleString();
            data.historial = [{ e: data.estado, f: data.fecha }];
            dbRef.push(data).then(() => { 
                document.getElementById('repairForm').reset(); 
                document.getElementById('nroOrden').value=""; 
                document.getElementById('cliente').focus();
            });
        }
    });

    dbRef.on('value', snap => {
        const val = snap.val();
        registros = val ? Object.keys(val).map(k => ({ id: k, ...val[k] })) : [];
        renderTable();
    });

    function renderTable() {
        const bus = document.getElementById('search').value.toLowerCase();
        const body = document.getElementById('tableBody');
        body.innerHTML = "";

        const filtrados = registros.filter(r => {
            const coincide = r.cliente.toLowerCase().includes(bus) || r.modelo.toLowerCase().includes(bus) || r.orden.toLowerCase().includes(bus);
            if (bus.length > 0) return coincide;
            return (modoArchivo ? r.archivado : !r.archivado);
        });

        filtrados.reverse().forEach(r => {
            const saldo = r.precio - r.sena;
            const esArchivado = r.archivado;
            body.innerHTML += `
                <tr style="${esArchivado && bus.length > 0 ? 'background: #f9fafb; opacity: 0.8;' : ''}">
                    <td><span class="order-tag">${r.orden}</span></td>
                    <td><b>${r.cliente}</b><br><button class="btn-wapp" onclick="enviarWapp('${r.id}')">📲 WhatsApp</button></td>
                    <td><b>${r.modelo}</b><br><small>Falla: ${r.falla}</small></td>
                    <td>
                        <select onchange="cambiarEstado('${r.id}', this.value)" ${esArchivado?'disabled':''}>
                            <option value="Pendiente" ${r.estado=='Pendiente'?'selected':''}>Pendiente</option>
                            <option value="Revision" ${r.estado=='Revision'?'selected':''}>Revisión</option>
                            <option value="Reparado" ${r.estado=='Reparado'?'selected':''}>Reparado</option>
                            <option value="Entregado" ${r.estado=='Entregado'?'selected':''}>Entregado</option>
                        </select>
                        <button style="border:none; background:none; cursor:pointer; font-size:11px; display:block; margin-top:5px; color:blue;" onclick="verHistorial('${r.id}')">Ver Historial</button>
                    </td>
                    <td>
                        <small>Total: ${fmt.format(r.precio)}</small><br>
                        ${saldo > 0 ? `<span class="badge-debe">Debe: ${fmt.format(saldo)}</span>` : `<span class="badge-pagado">PAGADO</span>`}
                    </td>
                    <td>
                        <div style="display:flex; gap:8px;">
                        ${esArchivado ? 
                            `<button onclick="restaurar('${r.id}')">⏪</button> 
                             <button onclick="borrarDefinitivo('${r.id}')" style="color:var(--danger); font-weight:bold;">❌</button>` : 
                            `<button onclick="editar('${r.id}')">✏️</button> 
                             <button onclick="imprimir('${r.id}')">📄</button> 
                             <button onclick="archivar('${r.id}')" style="color:var(--danger)">🗑️</button>`
                        }
                        </div>
                    </td>
                </tr>`;
        });
    }

    function enviarWapp(id) {
        const r = registros.find(x => x.id === id);
        const msg = `*S.T. MATIAS - REPARACIONES*\n\nHola *${r.cliente}*:\n📌 *Orden:* ${r.orden}\n📱 *Equipo:* ${r.modelo}\n✅ *Tu equipo está en estado:* ${r.estado.toUpperCase()}\n\n_⚠️ Este es un mensaje automático, por favor no lo responda._`;
        window.open(`https://wa.me/${r.tel}?text=${encodeURIComponent(msg)}`);
    }

    function imprimir(id) {
        const r = registros.find(x => x.id === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: [80, 150] });
        const saldo = r.precio - r.sena;

        doc.setFillColor(26, 42, 58);
        doc.rect(0, 0, 80, 15, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(14); doc.setFont("helvetica", "bold");
        doc.text("S.T. MATIAS", 40, 10, {align:'center'});

        doc.setTextColor(26, 42, 58);
        doc.setFontSize(9);
        doc.text("COMPROBANTE DE INGRESO", 40, 20, {align:'center'});
        doc.setFontSize(11);
        doc.text("ORDEN: " + r.orden, 40, 26, {align:'center'});
        
        doc.setDrawColor(26, 42, 58); doc.line(5, 33, 75, 33);

        doc.setTextColor(40, 40, 40); doc.setFontSize(8);
        let y = 39;
        const printRow = (l, v) => {
            doc.setFont("helvetica", "bold"); doc.text(l, 5, y);
            doc.setFont("helvetica", "normal"); doc.text(String(v), 22, y);
            y += 5;
        };
        printRow("FECHA:", r.fecha);
        printRow("CLIENTE:", r.cliente);
        printRow("EQUIPO:", r.modelo);
        printRow("COLOR:", r.color);
        printRow("IMEI:", r.imei);
        printRow("FALLA:", r.falla);
        
        y += 2; doc.setDrawColor(200, 200, 200); doc.line(5, y, 75, y); y += 6;
        
        doc.setFontSize(9);
        doc.text("TOTAL:", 5, y); doc.text(fmt.format(r.precio), 75, y, {align:'right'}); y += 5;
        doc.text("SEÑA:", 5, y); doc.text(fmt.format(r.sena), 75, y, {align:'right'}); y += 7;

        if(saldo <= 0) {
            doc.setFillColor(220, 255, 220); doc.rect(4, y-4, 72, 8, 'F');
            doc.setFontSize(10); doc.text("EQUIPO PAGADO TOTALMENTE", 40, y+1.5, {align:'center'});
        } else {
            doc.setFillColor(245, 245, 245); doc.rect(4, y-4, 72, 8, 'F');
            doc.setFont("helvetica", "bold"); doc.setFontSize(10);
            doc.text("SALDO PENDIENTE:", 6, y+1.5);
            doc.text(fmt.format(saldo), 74, y+1.5, {align:'right'});
        }
        
        doc.save(`Ticket_${r.orden}.pdf`);
    }

    function cambiarEstado(id, e) {
        const r = registros.find(x => x.id === id);
        const h = r.historial || [];
        h.push({e: e, f: new Date().toLocaleString()});
        db.ref('reparaciones/'+id).update({estado: e, historial: h});
    }

    function archivar(id) { if(confirm("¿Archivar equipo?")) db.ref('reparaciones/'+id).update({archivado: true}); }
    function restaurar(id) { db.ref('reparaciones/'+id).update({archivado: false}); }
    function borrarDefinitivo(id) { if(confirm("🚨 ¡ATENCIÓN! ¿Borrar permanentemente este registro?")) db.ref('reparaciones/'+id).remove(); }
    
    function toggleArchivo() { 
        modoArchivo = !modoArchivo; 
        const btn = document.getElementById('btnArchivo');
        btn.innerText = modoArchivo ? "⬅️ VOLVER A ACTIVOS" : "📁 VER ARCHIVADOS";
        renderTable(); 
    }

    function verHistorial(id) {
        const r = registros.find(x => x.id === id);
        document.getElementById('listaHistorial').innerHTML = (r.historial || []).map(h => `<li><b>${h.e}</b> - <small>${h.f}</small></li>`).join('');
        document.getElementById('historialModal').style.display = 'block';
    }

    function cerrarModal() { document.getElementById('historialModal').style.display = 'none'; }

    function editar(id) {
        const r = registros.find(x => x.id === id);
        idEditando = id;
        document.getElementById('nroOrden').value = r.orden;
        document.getElementById('cliente').value = r.cliente;
        document.getElementById('tel').value = r.tel;
        document.getElementById('modelo').value = r.modelo;
        document.getElementById('color').value = r.color;
        document.getElementById('imei').value = r.imei;
        document.getElementById('precio').value = r.precio;
        document.getElementById('sena').value = r.sena;
        document.getElementById('costoRepuesto').value = r.costoRepuesto;
        document.getElementById('falla').value = r.falla;
        document.getElementById('observaciones').value = r.observaciones;
        document.getElementById('esPagado').checked = (r.precio > 0 && r.sena === r.precio);
        document.getElementById('btnSubmit').innerText = "💾 GUARDAR CAMBIOS";
        document.getElementById('btnCancel').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicion() { idEditando = null; document.getElementById('repairForm').reset(); document.getElementById('btnSubmit').innerText = "REGISTRAR EQUIPO"; document.getElementById('btnCancel').style.display = "none"; document.getElementById('cliente').focus(); }
    
    function exportarExcel() {
        const data = registros.map(r => ({
            Fecha: r.fecha, Orden: r.orden, Cliente: r.cliente, Equipo: r.modelo, Falla: r.falla, Precio: r.precio, Costo: r.costoRepuesto, Estado: r.estado
        }));
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Contabilidad");
        XLSX.writeFile(wb, "Contabilidad_ST_Matias.xlsx");
    }
</script>
</body>
</html>
