<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.T. Matias - Gestión Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #1a2a3a; --secondary: #3498db; --success: #27ae60; --wapp: #25d366; --danger: #e53e3e; }
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f7; margin: 0; padding: 15px; padding-bottom: 100px; color: #333; }
        .container { max-width: 1150px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; background: #fdfdfd; padding: 20px; border-radius: 10px; border: 1px solid #e0e6ed; margin-bottom: 25px; }
        .full { grid-column: 1 / -1; }

        label { display: block; margin-bottom: 5px; font-weight: 700; color: #555; font-size: 0.70rem; text-transform: uppercase; }
        input, select { width: 100%; padding: 11px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        
        .costo-privado { display: flex; align-items: flex-end; gap: 5px; }
        .btn-lock { background: #f1f5f9; border: 1px solid #cbd5e0; border-radius: 8px; padding: 10px; cursor: pointer; font-size: 16px; transition: 0.3s; height: 41px; display: flex; align-items: center; justify-content: center; width: 45px;}
        
        .pago-container { display: flex; align-items: center; gap: 8px; padding-top: 28px; }
        .pago-container input { width: auto; cursor: pointer; }
        
        .btn { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--primary); width: 100%; }
        .btn-excel { background: #1d6f42; margin: 20px auto; width: 100%; max-width: 300px; font-size: 13px; }
        .btn-wapp { background: var(--wapp); font-size: 11px; padding: 6px 12px; border-radius: 6px; color:white; text-decoration:none; margin-top:5px; border:none; cursor:pointer;}
        .btn-historial { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px; font-size: 11px; cursor: pointer; margin-top: 5px; font-weight: bold; width: 100%; color: #4a5568;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; min-width: 800px; }
        th { background: #f1f5f9; padding: 15px; text-align: left; font-size: 11px; color: #475569; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        .toggle-table { cursor: pointer; font-size: 20px; user-select: none; transition: 0.3s; display: inline-block; color: var(--secondary); }
        .rotate { transform: rotate(-90deg); }

        .order-tag { font-family: 'Courier New', monospace; font-weight: bold; color: var(--secondary); background: #ebf8ff; padding: 4px 10px; border-radius: 6px; border: 1px solid #bee3f8; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
        .modal-content { background: white; margin: 10% auto; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; position: relative; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
        <h2 style="color: var(--primary); margin:0;">📱 S.T. <span style="color: var(--secondary);">MATIAS</span></h2>
        <div id="status" style="font-size: 12px; font-weight: bold; border-radius: 20px; padding: 5px 15px; background: #eee;">Conectando...</div>
    </div>
    
    <form id="repairForm">
        <div class="form-grid">
            <div><label>Orden</label><input type="text" id="nroOrden" readonly placeholder="AUTO"></div>
            <div><label>Cliente</label><input type="text" id="cliente" required oninput="generarOrden()"></div>
            <div><label>WhatsApp</label><input type="text" id="tel" required placeholder="549..."></div>
            
            <div><label>Modelo</label><input type="text" id="modelo" required></div>
            <div><label>Color</label><input type="text" id="color" placeholder="Ej: Azul"></div>
            <div><label>IMEI / Serie</label><input type="text" id="imei" placeholder="15 dígitos"></div>
            
            <div><label>Precio Final $</label><input type="number" id="precio" value="0"></div>
            <div><label>Seña $</label><input type="number" id="sena" value="0"></div>

            <div class="costo-privado">
                <div id="costoWrapper" style="display: none; flex-grow: 1;">
                    <label>Costo Repuesto $</label>
                    <input type="number" id="costoRepuesto" value="0">
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button type="button" class="btn-lock" onclick="toggleCosto()" id="lockBtn" title="Mostrar/Ocultar Costo">🔓</button>
                </div>
            </div>
            
            <div class="pago-container">
                <input type="checkbox" id="pagoCheck">
                <label for="pagoCheck">PAGO TOTAL</label>
            </div>

            <div class="full"><label>Falla Reportada</label><input type="text" id="falla" required></div>
            <div class="full"><label>Observaciones (Estado estético, accesorios, etc.)</label><input type="text" id="observaciones"></div>
            
            <div class="full">
                <button type="submit" id="btnSubmit" class="btn btn-main" disabled>CARGANDO...</button>
                <button type="button" id="btnCancelEdit" class="btn" style="display:none; background:#94a3b8; margin-top:10px; width:100%;" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
            </div>
        </div>
    </form>

    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <span class="toggle-table" id="arrowToggle" onclick="toggleTablaCompleta()">▼</span>
        <input type="text" id="search" placeholder="🔎 Buscar por nombre, equipo, orden o IMEI..." onkeyup="dibujarTabla()" style="flex-grow: 1; padding:12px; border-radius:10px; border:1px solid #cbd5e0; outline:none;">
    </div>

    <div id="tableWrapper" style="overflow-x: auto;">
        <table id="mainTable">
            <thead>
                <tr>
                    <th>Orden</th>
                    <th>Cliente / Contacto</th>
                    <th>Equipo / Falla</th>
                    <th>Estado</th>
                    <th>Monto / Saldo</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button onclick="exportarExcel()" class="btn btn-excel">📥 EXPORTAR BASE DE DATOS (EXCEL)</button>
</div>

<div id="historialModal" class="modal">
    <div class="modal-content">
        <span class="close" style="position:absolute; right:20px; top:15px; cursor:pointer;" onclick="cerrarModal()">&times;</span>
        <h3 style="margin:0; color:var(--primary);">🕒 Historial de Estados</h3>
        <p id="modalSub" style="font-size:12px; color:#64748b;"></p>
        <ul id="modalLista" style="list-style: none; padding: 0; margin-top: 15px;"></ul>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyBuwEdF-AOYPD9ent-H5f2YjGZ097ErdPE",
      authDomain: "tallermatias-efdf2.firebaseapp.com",
      databaseURL: "https://tallermatias-efdf2-default-rtdb.firebaseio.com",
      projectId: "tallermatias-efdf2",
      storageBucket: "tallermatias-efdf2.firebasestorage.app",
      messagingSenderId: "862631941290",
      appId: "1:862631941290:web:5f7455bef29eeb3c76acd3"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const dbRef = db.ref('reparaciones');
    let registros = [];
    let idEditando = null;

    function toggleTablaCompleta() {
        const wrapper = document.getElementById('tableWrapper');
        const arrow = document.getElementById('arrowToggle');
        if (wrapper.style.display === "none") {
            wrapper.style.display = "block";
            arrow.classList.remove('rotate');
        } else {
            wrapper.style.display = "none";
            arrow.classList.add('rotate');
        }
    }

    function toggleCosto() {
        const wrapper = document.getElementById('costoWrapper');
        const btn = document.getElementById('lockBtn');
        if (wrapper.style.display === "none" || wrapper.style.display === "") {
            wrapper.style.display = "block";
            btn.innerText = "🔒";
        } else {
            wrapper.style.display = "none";
            btn.innerText = "🔓";
        }
    }

    db.ref(".info/connected").on("value", (snap) => {
        const btn = document.getElementById('btnSubmit');
        const status = document.getElementById('status');
        if (snap.val() === true) {
            btn.disabled = false; btn.innerText = idEditando ? "💾 GUARDAR CAMBIOS" : "REGISTRAR EQUIPO";
            status.innerText = "ONLINE"; status.style.background = "#dcfce7"; status.style.color = "#166534";
        } else {
            btn.disabled = true; status.innerText = "OFFLINE"; status.style.background = "#fee2e2"; status.style.color = "#991b1b";
        }
    });

    function generarOrden() {
        if (!idEditando && document.getElementById('cliente').value.length > 0 && !document.getElementById('nroOrden').value) {
            document.getElementById('nroOrden').value = "MAT-" + Math.floor(Math.random() * 90000 + 10000);
        }
    }

    document.getElementById('repairForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
            orden: document.getElementById('nroOrden').value,
            cliente: document.getElementById('cliente').value,
            tel: document.getElementById('tel').value,
            modelo: document.getElementById('modelo').value,
            color: document.getElementById('color').value,
            imei: document.getElementById('imei').value,
            precio: parseFloat(document.getElementById('precio').value) || 0,
            costoRepuesto: parseFloat(document.getElementById('costoRepuesto').value) || 0,
            sena: parseFloat(document.getElementById('sena').value) || 0,
            pago: document.getElementById('pagoCheck').checked,
            falla: document.getElementById('falla').value,
            observaciones: document.getElementById('observaciones').value
        };

        if (idEditando) {
            db.ref('reparaciones/' + idEditando).update(data).then(() => {
                alert("✅ Actualizado");
                cancelarEdicion();
            });
        } else {
            data.estado = 'Pendiente';
            data.fecha = new Date().toLocaleString('es-AR');
            data.historial = [{ estado: 'Ingreso', fecha: data.fecha }];
            dbRef.push(data).then(() => {
                alert("✅ Registrado");
                cancelarEdicion();
            });
        }
    });

    dbRef.on('value', (snapshot) => {
        const data = snapshot.val();
        registros = data ? Object.keys(data).map(key => ({ fireId: key, ...data[key] })) : [];
        dibujarTabla();
    });

    function dibujarTabla() {
        const busqueda = document.getElementById('search').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        registros.filter(r => 
            r.cliente.toLowerCase().includes(busqueda) || 
            r.modelo.toLowerCase().includes(busqueda) || 
            r.orden.toLowerCase().includes(busqueda) ||
            (r.imei && r.imei.toLowerCase().includes(busqueda))
        )
        .reverse().forEach(r => {
            const saldo = r.pago ? 0 : (r.precio - r.sena);
            tbody.innerHTML += `
                <tr>
                    <td><span class="order-tag">${r.orden}</span><br><small style="color:#94a3b8">${r.fecha.split(',')[0]}</small></td>
                    <td><b>${r.cliente}</b><br><button class="btn-wapp" onclick="enviarWapp('${r.fireId}')">📲 WhatsApp</button></td>
                    <td><b>${r.modelo}</b> (${r.color || 'S/C'})<br><small style="color:#64748b">Falla: ${r.falla}</small></td>
                    <td>
                        <select onchange="cambiarEstado('${r.fireId}', this.value)" style="font-weight:bold; color:var(--secondary); border:none; background:transparent; cursor:pointer;">
                            <option ${r.estado=='Pendiente'?'selected':''}>Pendiente</option>
                            <option ${r.estado=='En Revisión'?'selected':''}>En Revisión</option>
                            <option ${r.estado=='Reparado'?'selected':''}>Reparado</option>
                            <option ${r.estado=='Entregado'?'selected':''}>Entregado</option>
                        </select>
                        <button class="btn-historial" onclick="abrirHistorial('${r.fireId}')">🕒 Ver Historial</button>
                    </td>
                    <td><b>$${r.precio}</b><br><small style="font-weight:bold; color:${saldo>0?'#e53e3e':'#38a169'}">${r.pago?'PAGADO':'Debe $'+saldo}</small></td>
                    <td>
                        <div style="display:flex; gap:12px;">
                            <button onclick="editar('${r.fireId}')" style="background:none; border:none; cursor:pointer; font-size:18px;">✏️</button>
                            <button onclick="generarPDF('${r.fireId}')" style="background:none; border:none; cursor:pointer; font-size:18px;">📄</button>
                            <button onclick="borrar('${r.fireId}')" style="background:none; border:none; cursor:pointer; font-size:18px; color:#e53e3e;">🗑️</button>
                        </div>
                    </td>
                </tr>`;
        });
    }

    /* PDF RESTAURADO AL DISEÑO PROFESIONAL ANTERIOR */
    function generarPDF(id) {
        const r = registros.find(x => x.fireId === id);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: "mm", format: [80, 160] });
        const ancho = 80;
        const centro = ancho / 2;

        // Cabecera oscura
        doc.setFillColor(26, 42, 58);
        doc.rect(0, 0, ancho, 25, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(14);
        doc.text("S.T. MATIAS", centro, 10, {align:'center'});
        doc.setFontSize(8);
        doc.setFont("helvetica", "normal");
        doc.text("Servicio Técnico Especializado", centro, 15, {align:'center'});
        doc.text("Gestión de Reparaciones Profesionales", centro, 20, {align:'center'});

        // Recuadro de Orden
        doc.setTextColor(40, 40, 40);
        doc.setDrawColor(200, 200, 200);
        doc.roundedRect(5, 30, 70, 12, 2, 2, 'S');
        doc.setFont("helvetica", "bold");
        doc.setFontSize(9);
        doc.text(`ORDEN: ${r.orden}`, centro, 37.5, {align:'center'});

        let y = 50;
        doc.setFontSize(8);
        doc.text("CLIENTE:", 8, y);
        doc.setFont("helvetica", "normal");
        doc.text(r.cliente, 25, y);
        y += 6;
        doc.setFont("helvetica", "bold");
        doc.text("FECHA:", 8, y);
        doc.setFont("helvetica", "normal");
        doc.text(r.fecha.split(',')[0], 25, y);

        y += 5; doc.setLineDash([1, 1], 0); doc.line(8, y, 72, y); doc.setLineDash([], 0);

        y += 8;
        doc.setFont("helvetica", "bold");
        doc.text("EQUIPO:", 8, y);
        y += 5;
        doc.setFont("helvetica", "normal");
        doc.text(`${r.modelo} (${r.color || 'S/C'})`, 8, y);
        
        y += 6;
        doc.setFont("helvetica", "bold");
        doc.text("IMEI/SERIE:", 8, y);
        doc.setFont("helvetica", "normal");
        doc.text(r.imei || 'N/A', 25, y);

        y += 8;
        doc.setFont("helvetica", "bold");
        doc.text("FALLA REPORTADA:", 8, y);
        y += 5;
        doc.setFont("helvetica", "normal");
        const fallaLines = doc.splitTextToSize(r.falla, 65);
        doc.text(fallaLines, 8, y);

        // Desglose de precios sombreado
        y += (fallaLines.length * 5) + 5;
        doc.setFillColor(245, 247, 250);
        doc.rect(5, y, 70, 28, 'F');
        y += 7;
        doc.setFont("helvetica", "bold");
        doc.text("TOTAL:", 10, y);
        doc.text(`$${r.precio}`, 70, y, {align:'right'});
        y += 6;
        doc.text("SEÑA:", 10, y);
        doc.text(`$${r.sena}`, 70, y, {align:'right'});
        y += 8;
        const saldo = r.pago ? 0 : (r.precio - r.sena);
        doc.setFontSize(10);
        if(saldo > 0) doc.setTextColor(200, 0, 0); else doc.setTextColor(0, 150, 0);
        doc.text("PENDIENTE:", 10, y);
        doc.text(`$${saldo}`, 70, y, {align:'right'});

        y += 15;
        doc.setTextColor(150, 150, 150);
        doc.setFontSize(7);
        doc.setFont("helvetica", "italic");
        doc.text("Conserve este comprobante para retirar el equipo.", centro, y, {align:'center'});
        
        doc.save(`Ticket_${r.orden}.pdf`);
    }

    function editar(id) {
        const r = registros.find(x => x.fireId === id);
        document.getElementById('nroOrden').value = r.orden;
        document.getElementById('cliente').value = r.cliente;
        document.getElementById('tel').value = r.tel;
        document.getElementById('modelo').value = r.modelo;
        document.getElementById('color').value = r.color || '';
        document.getElementById('imei').value = r.imei || '';
        document.getElementById('precio').value = r.precio;
        document.getElementById('sena').value = r.sena;
        document.getElementById('falla').value = r.falla;
        document.getElementById('observaciones').value = r.observaciones || '';
        idEditando = id;
        document.getElementById('btnSubmit').innerText = "💾 GUARDAR CAMBIOS";
        document.getElementById('btnCancelEdit').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicion() {
        document.getElementById('repairForm').reset();
        idEditando = null;
        document.getElementById('btnSubmit').innerText = "REGISTRAR EQUIPO";
        document.getElementById('btnCancelEdit').style.display = "none";
        document.getElementById('nroOrden').value = "";
    }

    function enviarWapp(id) {
        const r = registros.find(x => x.fireId === id);
        const estadoMsg = r.estado.toUpperCase();
        const msg = `*S.T. MATIAS - NOTIFICACIÓN DE SERVICIO*\n\n` +
                    `Estimado/a *${r.cliente}*,\n` +
                    `Le informamos sobre el estado de su equipo:\n\n` +
                    `• *Orden:* ${r.orden}\n` +
                    `• *Equipo:* ${r.modelo}\n` +
                    `• *IMEI:* ${r.imei || 'N/A'}\n` +
                    `• *Estado Actual:* ✅ ${estadoMsg}\n\n` +
                    `_Este es un mensaje automático generado por nuestro sistema de gestión. Por favor, no responda a este chat._`;
        window.open(`https://wa.me/${r.tel}?text=${encodeURIComponent(msg)}`);
    }

    function cambiarEstado(id, nuevo) {
        const r = registros.find(x => x.
